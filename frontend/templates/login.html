{% extends "base.html" %}
{% block title %}Login — AgriNova AI{% endblock %}

{% block styles %}
<style>
.auth-bg {
    min-height: 100vh;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 40%, #f1f5f9 100%);
    display: flex; align-items: center; justify-content: center;
}
</style>
{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="auth-container w-100 px-3 py-5">
        <div class="glass-card shadow-lg">
            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="mx-auto mb-3" style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#16A34A,#22C55E);display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-flower1 text-white fs-4"></i>
                </div>
                <h3 class="fw-bold mb-1">Welcome Back</h3>
                <p class="text-muted small">Sign in to your AgriNova AI account</p>
            </div>

            <!-- Error Alert -->
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <!-- Login Form -->
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-500">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="email" class="form-control border-start-0 ps-0" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-500">Password</label>
                        <a href="/forgot-password" class="small text-success">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Enter your password" required>
                        <button type="button" class="input-group-text bg-white" id="togglePw">
                            <i class="bi bi-eye text-muted" id="pwIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-success w-100 py-2 mt-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
                New to AgriNova AI? <a href="/register" class="text-success fw-semibold">Create Free Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Toggle password visibility
document.getElementById("togglePw").addEventListener("click", () => {
    const pw = document.getElementById("password");
    const icon = document.getElementById("pwIcon");
    if (pw.type === "password") {
        pw.type = "text";
        icon.className = "bi bi-eye-slash text-muted";
    } else {
        pw.type = "password";
        icon.className = "bi bi-eye text-muted";
    }
});

// Check login message from redirect
const params = new URLSearchParams(window.location.search);
const msg = params.get("msg");
if (msg) {
    const ab = document.getElementById("alertBox");
    ab.textContent = msg;
    ab.className = "alert alert-info";
}
</script>
{% endblock %}

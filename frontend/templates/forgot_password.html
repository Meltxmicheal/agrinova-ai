{% extends "base.html" %}
{% block title %}Forgot Password — AgriNova AI{% endblock %}

{% block styles %}
<style>
.auth-bg { min-height: 100vh; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 40%, #f1f5f9 100%); display: flex; align-items: center; justify-content: center; }
</style>
{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="auth-container w-100 px-3 py-5">
        <div class="glass-card shadow-lg">
            <div class="text-center mb-4">
                <div class="mx-auto mb-3" style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#16A34A,#22C55E);display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-key text-white fs-4"></i>
                </div>
                <h3 class="fw-bold mb-1">Forgot Password</h3>
                <p class="text-muted small">Enter your registered email to receive a password reset token.</p>
            </div>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="forgotForm">
                <div class="mb-4">
                    <label class="form-label fw-500">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="email" class="form-control border-start-0 ps-0" placeholder="your@email.com" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                    <i class="bi bi-send me-2"></i>Send Reset Token
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
                Remembered your password? <a href="/login" class="text-success fw-semibold">Back to Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

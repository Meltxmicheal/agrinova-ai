<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgriNova AI - AI-powered Smart Agriculture Platform for crop recommendation, yield prediction, disease detection, and more.">
    <title>{% block title %}AgriNova AI{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block styles %}{% endblock %}
</head>
<body>

    {% block content %}{% endblock %}

    <!-- AI Farm Assistant Chatbot -->
    <div id="aiChatWidget" class="ai-chat-widget">
        <button id="aiChatToggle" class="btn btn-success rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; position: fixed; bottom: 20px; right: 20px; z-index: 1050;">
            <i class="bi bi-robot fs-3 text-white"></i>
        </button>
        
        <div id="aiChatBox" class="glass-card shadow-lg d-none flex-column" style="position: fixed; bottom: 90px; right: 20px; width: 350px; height: 500px; z-index: 1050; padding: 0; overflow: hidden; display: flex;">
            <div class="bg-success text-white p-3 d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold"><i class="bi bi-robot me-2"></i>{{ 'AI Farm Assistant' | t }}</h6>
                <button id="aiChatClose" class="btn-close btn-close-white"></button>
            </div>
            
            <div id="aiChatMessages" class="flex-grow-1 p-3" style="overflow-y: auto; background: rgba(255, 255, 255, 0.5);">
                <div class="d-flex mb-3">
                    <div class="bg-light rounded-3 p-2 text-dark small" style="max-width: 80%;">
                        Hello! I am your AI Farm Assistant. Ask me about your crops, weather, or soil conditions.
                    </div>
                </div>
            </div>
            
            <div class="p-3 bg-white border-top">
                <form id="aiChatForm" class="d-flex gap-2">
                    <input type="text" id="aiChatInput" class="form-control form-control-sm" placeholder="{{ 'Ask me anything...' | t }}" required autocomplete="off">
                    <button type="submit" class="btn btn-sm btn-success"><i class="bi bi-send"></i></button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <!-- Location Data -->
    <script src="{{ url_for('static', filename='js/locations.js') }}"></script>
    <!-- AgriNova App JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toggleBtn = document.getElementById("aiChatToggle");
            const closeBtn = document.getElementById("aiChatClose");
            const chatBox = document.getElementById("aiChatBox");
            const chatForm = document.getElementById("aiChatForm");
            const chatInput = document.getElementById("aiChatInput");
            const chatMessages = document.getElementById("aiChatMessages");

            if(toggleBtn && chatBox) {
                toggleBtn.addEventListener("click", () => {
                    chatBox.classList.toggle("d-none");
                    chatBox.style.display = chatBox.classList.contains("d-none") ? "none" : "flex";
                });
                closeBtn.addEventListener("click", () => {
                    chatBox.classList.add("d-none");
                    chatBox.style.display = "none";
                });

                chatForm.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const msg = chatInput.value.trim();
                    if(!msg) return;

                    // Append User msg
                    chatMessages.innerHTML += `
                        <div class="d-flex mb-3 justify-content-end">
                            <div class="bg-success text-white rounded-3 p-2 small" style="max-width: 80%;">
                                ${msg}
                            </div>
                        </div>
                    `;
                    chatInput.value = "";
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    // Show typing
                    const typingId = "typing-" + Date.now();
                    chatMessages.innerHTML += `
                        <div id="${typingId}" class="d-flex mb-3">
                            <div class="bg-light rounded-3 p-2 text-dark small text-muted" style="max-width: 80%;">
                                <i class="bi bi-three-dots"></i> Typing...
                            </div>
                        </div>
                    `;
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    try {
                        const res = await fetch("/api/assistant/chat", {
                            method: "POST",
                            headers: { 
                                "Content-Type": "application/json",
                                "Authorization": "Bearer " + localStorage.getItem("access_token") 
                            },
                            body: JSON.stringify({ message: msg, history: [] })
                        });
                        
                        document.getElementById(typingId).remove();
                        const data = await res.json();
                        
                        if(data.success) {
                            chatMessages.innerHTML += `
                                <div class="d-flex mb-3">
                                    <div class="bg-light rounded-3 p-2 text-dark small" style="max-width: 80%;">
                                        ${data.reply}
                                    </div>
                                </div>
                            `;
                        } else {
                            chatMessages.innerHTML += `
                                <div class="d-flex mb-3">
                                    <div class="bg-danger text-white rounded-3 p-2 small" style="max-width: 80%;">
                                        ${data.message || 'Error occurred.'}
                                    </div>
                                </div>
                            `;
                        }
                    } catch (err) {
                        document.getElementById(typingId).remove();
                        chatMessages.innerHTML += `
                            <div class="d-flex mb-3">
                                <div class="bg-danger text-white rounded-3 p-2 small" style="max-width: 80%;">
                                    Failed to reach assistant.
                                </div>
                            </div>
                        `;
                    }
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

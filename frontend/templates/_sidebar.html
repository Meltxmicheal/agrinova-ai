<!-- Shared Sidebar Navigation Macro -->
<!-- Usage: include "_sidebar.html" -->

<nav class="sidebar d-flex flex-column" id="appSidebar">

    <!-- Brand Logo -->
    <a href="/dashboard" class="sidebar-logo text-decoration-none mb-2">
        <div class="me-2" style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#16A34A,#22C55E);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="bi bi-flower1 text-white" style="font-size:1.1rem;"></i>
        </div>
        <div>
            <span class="fw-bold" style="font-family:'Poppins',sans-serif;color:#0F172A;font-size:1.05rem;">AgriNova <span class="text-success">AI</span></span>
            <br><small class="text-muted" style="font-size:0.65rem;line-height:1;">Smart Agriculture</small>
        </div>
    </a>

    <hr class="my-2">

    <!-- Navigation Links -->
    <ul class="nav flex-column flex-grow-1">
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                <i class="bi bi-speedometer2"></i> {{ 'Dashboard' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/farms' %}active{% endif %}" href="/farms">
                <i class="bi bi-geo-alt"></i> {{ 'Farms' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/weather' %}active{% endif %}" href="/weather">
                <i class="bi bi-cloud-sun"></i> {{ 'Weather' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/prediction' %}active{% endif %}" href="/prediction">
                <i class="bi bi-cpu"></i> {{ 'Predictions' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/reports' %}active{% endif %}" href="/reports">
                <i class="bi bi-file-earmark-bar-graph"></i> {{ 'Reports' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/profile' %}active{% endif %}" href="/profile">
                <i class="bi bi-person-circle"></i> {{ 'Profile' | t }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">
                <i class="bi bi-gear"></i> {{ 'Settings' | t }}
            </a>
        </li>
    </ul>

    <!-- Language Switcher -->
    <div class="mt-auto px-3 py-2">
        <select class="form-select form-select-sm" id="languageSelect" onchange="changeLanguage(this.value)" style="background-color: rgba(255,255,255,0.5);">
            <option value="en" {% if current_lang == 'en' %}selected{% endif %}>{{ 'English' | t }}</option>
            <option value="ta" {% if current_lang == 'ta' %}selected{% endif %}>{{ 'Tamil' | t }}</option>
        </select>
    </div>

    <!-- Logout -->
    <div class="pt-2 border-top">
        <a href="#" class="nav-link text-danger fw-500" id="logoutBtn">
            <i class="bi bi-box-arrow-left me-2"></i> {{ 'Logout' | t }}
        </a>
    </div>
</nav>

<script>
function changeLanguage(lang) {
    document.cookie = "lang=" + lang + "; path=/; max-age=31536000";
    window.location.reload();
}
</script>

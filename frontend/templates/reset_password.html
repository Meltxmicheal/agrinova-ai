{% extends "base.html" %}
{% block title %}Reset Password — AgriNova AI{% endblock %}

{% block styles %}
<style>
.auth-bg { min-height: 100vh; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 40%, #f1f5f9 100%); display: flex; align-items: center; justify-content: center; }
</style>
{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="auth-container w-100 px-3 py-5">
        <div class="glass-card shadow-lg">
            <div class="text-center mb-4">
                <div class="mx-auto mb-3" style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#16A34A,#22C55E);display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-shield-check text-white fs-4"></i>
                </div>
                <h3 class="fw-bold mb-1">Reset Your Password</h3>
                <p class="text-muted small">Enter your reset token and choose a new password.</p>
            </div>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label fw-500">Reset Token</label>
                    <textarea id="token" class="form-control" rows="3" placeholder="Paste your reset token here" required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-500">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Minimum 8 characters" required minlength="8">
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                    <i class="bi bi-check2-shield me-2"></i>Reset Password
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
                Need a new token? <a href="/forgot-password" class="text-success fw-semibold">Request Again</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

databases:
  - name: agrinova-db
    plan: free
    databaseName: agrinova_db
    user: agrinova_admin

services:
  - type: web
    name: agrinova-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend && python -c "from ml.train_model import train_all_models; train_all_models()" || true
    startCommand: cd backend && gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 120 run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrinova-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENWEATHER_API_KEY
        sync: false
